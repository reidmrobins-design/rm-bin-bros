<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin | RM Bin Bros</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="index.html" class="brand"><img src="images/logo-mascot.png" alt="RM Bin Bros mascot logo" class="logo-badge" width="40" height="40" /> RM Bin Bros</a>
      <span style="font-weight:700; color:var(--color-ink-soft);">Admin</span>
    </div>
  </header>

  <section>
    <div class="container">
      <div class="card" style="margin-bottom:20px; display:flex; gap:12px; align-items:end; flex-wrap:wrap;">
        <div class="form-row" style="margin:0; flex:1; min-width:220px;">
          <label for="adminKey">Admin key</label>
          <input type="password" id="adminKey" placeholder="Enter admin key" />
        </div>
        <button id="loadBtn" class="btn btn-secondary">Load Appointments</button>
        <button id="refreshBtn" class="btn btn-ghost">Refresh</button>
      </div>

      <div id="alertBox"></div>

      <div style="overflow-x:auto;">
        <table class="admin-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Date</th>
              <th>Time</th>
              <th>Customer</th>
              <th>Contact</th>
              <th>Address</th>
              <th>Plan</th>
              <th>Visits</th>
              <th>Bins</th>
              <th>Status</th>
              <th>Notes</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="apptBody">
            <tr><td colspan="12">Enter your admin key and click "Load Appointments".</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </section>

  <section style="padding-top:0;">
    <div class="container">
      <div class="card" style="margin-bottom:20px; display:flex; gap:12px; align-items:center; justify-content:space-between; flex-wrap:wrap;">
        <h3 class="mt-0" style="margin:0;">Customer Reviews</h3>
        <button id="loadReviewsBtn" class="btn btn-secondary">Load Reviews</button>
      </div>

      <div id="reviewsAlertBox"></div>

      <div style="overflow-x:auto;">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Date</th>
              <th>Customer</th>
              <th>Plan</th>
              <th>Rating</th>
              <th>Comment</th>
              <th>Photos</th>
              <th>Status</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="reviewsBody">
            <tr><td colspan="8">Click "Load Reviews" to see submitted reviews.</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </section>

  <script src="js/admin.js"></script>
</body>
</html>
