<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin | RM Bin Bros</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="index.html" class="brand"><span class="logo-badge"><svg class="icon-logo" viewBox="0 0 24 24" width="22" height="22" xmlns="http://www.w3.org/2000/svg"><path fill="#fff" d="M10.32 5.28h3.36a0.96 0.96 0 0 1 0.96 0.96v0.96h-5.28v-0.96a0.96 0.96 0 0 1 0.96-0.96z"/><path fill="#fff" d="M6 7.2h12a1.2 1.2 0 0 1 0 2.4h-0.36l-0.96 8.64a1.44 1.44 0 0 1-1.44 1.32h-6.48a1.44 1.44 0 0 1-1.44-1.32l-0.96-8.64h-0.36a1.2 1.2 0 0 1 0-2.4z"/></svg></span> RM Bin Bros</a>
      <span style="font-weight:700; color:var(--color-ink-soft);">Admin</span>
    </div>
  </header>

  <section>
    <div class="container">
      <div class="card" style="margin-bottom:20px; display:flex; gap:12px; align-items:end; flex-wrap:wrap;">
        <div class="form-row" style="margin:0; flex:1; min-width:220px;">
          <label for="adminKey">Admin key</label>
          <input type="password" id="adminKey" placeholder="Enter admin key" />
        </div>
        <button id="loadBtn" class="btn btn-secondary">Load Appointments</button>
        <button id="refreshBtn" class="btn btn-ghost">Refresh</button>
      </div>

      <div id="alertBox"></div>

      <div style="overflow-x:auto;">
        <table class="admin-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Date</th>
              <th>Time</th>
              <th>Customer</th>
              <th>Contact</th>
              <th>Address</th>
              <th>Plan</th>
              <th>Visits</th>
              <th>Bins</th>
              <th>Status</th>
              <th>Notes</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="apptBody">
            <tr><td colspan="12">Enter your admin key and click "Load Appointments".</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </section>

  <script src="js/admin.js"></script>
</body>
</html>
