<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#e9e4d8"/>
  <rect x="0" y="330" width="400" height="70" fill="#cfc7b3"/>
  <ellipse cx="200" cy="358" rx="95" ry="14" fill="#00000022"/>

  <!-- bin body -->
  <rect x="140" y="185" width="120" height="175" rx="10" fill="#6b5a3a"/>
  <rect x="140" y="185" width="120" height="175" rx="10" fill="#00000018"/>

  <!-- grime streaks -->
  <path d="M160 200 C158 250 165 300 155 355" stroke="#3a2f1c" stroke-width="7" fill="none" stroke-linecap="round" opacity="0.75"/>
  <path d="M195 195 C200 240 188 300 198 355" stroke="#3a2f1c" stroke-width="10" fill="none" stroke-linecap="round" opacity="0.8"/>
  <path d="M235 200 C240 250 228 300 240 350" stroke="#3a2f1c" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.7"/>

  <!-- lid, ajar -->
  <g transform="translate(255 155) rotate(18)">
    <rect x="-70" y="-16" width="140" height="34" rx="8" fill="#4d4023"/>
  </g>
  <rect x="185" y="130" width="24" height="10" rx="3" fill="#3a2f1c"/>

  <!-- grime spots -->
  <circle cx="175" cy="230" r="5" fill="#2e2415" opacity="0.6"/>
  <circle cx="222" cy="260" r="4" fill="#2e2415" opacity="0.6"/>
  <circle cx="150" cy="300" r="4" fill="#2e2415" opacity="0.5"/>

  <!-- flies -->
  <g fill="#2b2b2b" opacity="0.85">
    <ellipse cx="280" cy="190" rx="4" ry="2.5"/>
    <ellipse cx="292" cy="205" rx="3.5" ry="2.2"/>
    <ellipse cx="270" cy="212" rx="3" ry="2"/>
  </g>

  <!-- wheels -->
  <circle cx="165" cy="362" r="10" fill="#2e2415"/>
  <circle cx="235" cy="362" r="10" fill="#2e2415"/>
</svg>
